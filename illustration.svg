<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#f0f4fd" stop-opacity="1" />
    </radialGradient>

    <!-- Glowing Blue Node Gradient -->
    <linearGradient id="blueNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f80ed" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>

    <!-- Glowing Purple Node Gradient -->
    <linearGradient id="purpleNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#e100ff" />
    </linearGradient>

    <!-- Green Node Gradient (representing green dot / active) -->
    <linearGradient id="greenNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e" />
      <stop offset="100%" stop-color="#38ef7d" />
    </linearGradient>

    <!-- Soft Drop Shadows -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="8" stdDeviation="12" flood-color="#1877f2" flood-opacity="0.12" />
    </filter>
    
    <filter id="avatarShadow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.08" />
    </filter>

    <filter id="chatShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="4" stdDeviation="6" flood-color="#101828" flood-opacity="0.05" />
    </filter>
  </defs>

  <style>
    /* Styling & Animation rules for the SVG */
    .connection-line {
      stroke-dasharray: 8 6;
      animation: dash 30s linear infinite;
    }
    .main-pulse {
      animation: pulse 3s ease-in-out infinite alternate;
    }
    .float-avatar-1 {
      animation: float1 6s ease-in-out infinite alternate;
    }
    .float-avatar-2 {
      animation: float2 7s ease-in-out infinite alternate;
    }
    .float-avatar-3 {
      animation: float3 8s ease-in-out infinite alternate;
    }
    .float-chat {
      animation: floatChat 5s ease-in-out infinite alternate;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -1000;
      }
    }
    @keyframes pulse {
      0% {
        r: 60px;
        opacity: 0.15;
      }
      100% {
        r: 85px;
        opacity: 0.25;
      }
    }
    @keyframes float1 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-8px, -12px); }
    }
    @keyframes float2 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(12px, -8px); }
    }
    @keyframes float3 {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-10px, 10px); }
    }
    @keyframes floatChat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5px, -8px) scale(1.02); }
    }
  </style>

  <!-- Background base -->
  <rect width="600" height="500" rx="30" fill="url(#bgGrad)" />

  <!-- Background Web Rings -->
  <circle cx="300" cy="250" r="180" fill="none" stroke="#e1e8f5" stroke-width="1.5" stroke-dasharray="4 4" />
  <circle cx="300" cy="250" r="120" fill="none" stroke="#e2eafd" stroke-width="1" />
  
  <!-- Central Pulse Effect -->
  <circle cx="300" cy="250" r="70" fill="#1877f2" class="main-pulse" opacity="0.18" />
  
  <!-- Central Connection Center -->
  <circle cx="300" cy="250" r="10" fill="#1877f2" filter="url(#softShadow)" />

  <!-- Connection Lines (Paths) linking nodes -->
  <!-- Line 1: Center to Top-Left Node (140, 120) -->
  <path d="M 300 250 Q 200 160, 140 120" fill="none" stroke="#1877f2" stroke-width="2.5" class="connection-line" opacity="0.6" />
  
  <!-- Line 2: Center to Bottom-Left Node (120, 360) -->
  <path d="M 300 250 Q 180 320, 120 360" fill="none" stroke="#1877f2" stroke-width="2.5" class="connection-line" opacity="0.6" />

  <!-- Line 3: Center to Top-Right Node (460, 130) -->
  <path d="M 300 250 Q 400 180, 460 130" fill="none" stroke="#00d2ff" stroke-width="2.5" class="connection-line" opacity="0.6" />

  <!-- Line 4: Center to Bottom-Right Node (470, 370) -->
  <path d="M 300 250 Q 420 330, 470 370" fill="none" stroke="#7f00ff" stroke-width="2.5" class="connection-line" opacity="0.6" />

  <!-- Inter-Node Webbing -->
  <path d="M 140 120 Q 90 240, 120 360" fill="none" stroke="#cbd7ee" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5" />
  <path d="M 460 130 Q 520 250, 470 370" fill="none" stroke="#cbd7ee" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5" />
  <path d="M 140 120 Q 300 80, 460 130" fill="none" stroke="#cbd7ee" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5" />
  <path d="M 120 360 Q 300 420, 470 370" fill="none" stroke="#cbd7ee" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5" />

  <!-- ================= AVATAR NODES ================= -->

  <!-- Top-Left Node -->
  <g class="float-avatar-1" filter="url(#avatarShadow)">
    <circle cx="140" cy="120" r="32" fill="#ffffff" />
    <!-- Stylized Avatar Graphic (Female) -->
    <path d="M 116 142 C 116 130, 124 124, 140 124 C 156 124, 164 130, 164 142 Z" fill="#b0c4de" />
    <circle cx="140" cy="112" r="12" fill="#ffccd5" />
    <!-- Hair -->
    <path d="M 126 112 C 126 95, 154 95, 154 112 C 154 116, 148 116, 140 116 C 132 116, 126 116, 126 112 Z" fill="#4f5b66" />
    <!-- Active Green Indicator -->
    <circle cx="168" cy="108" r="6" fill="url(#greenNodeGrad)" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Bottom-Left Node -->
  <g class="float-avatar-3" filter="url(#avatarShadow)">
    <circle cx="120" cy="360" r="36" fill="#ffffff" />
    <!-- Stylized Avatar Graphic (Male) -->
    <path d="M 94 385 C 94 372, 103 365, 120 365 C 137 365, 146 372, 146 385 Z" fill="#90caf9" />
    <circle cx="120" cy="347" r="14" fill="#ffe0b2" />
    <!-- Hair -->
    <path d="M 104 344 C 104 330, 136 330, 136 344 C 136 346, 130 348, 120 348 C 110 348, 104 346, 104 344 Z" fill="#5d4037" />
    <!-- Connection Status -->
    <circle cx="150" cy="342" r="6" fill="url(#greenNodeGrad)" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Top-Right Node -->
  <g class="float-avatar-2" filter="url(#avatarShadow)">
    <circle cx="460" cy="130" r="34" fill="#ffffff" />
    <!-- Stylized Avatar Graphic (Male 2) -->
    <path d="M 435 155 C 435 142, 444 135, 460 135 C 476 135, 485 142, 485 155 Z" fill="#b2dfdb" />
    <circle cx="460" cy="118" r="13" fill="#ffe0b2" />
    <!-- Hair & Cap -->
    <path d="M 444 116 C 444 105, 476 105, 476 116 Z" fill="#263238" />
    <!-- Active Green Indicator -->
    <circle cx="488" cy="116" r="6" fill="url(#greenNodeGrad)" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Bottom-Right Node -->
  <g class="float-avatar-1" filter="url(#avatarShadow)">
    <circle cx="470" cy="370" r="30" fill="#ffffff" />
    <!-- Stylized Avatar Graphic (Female 2) -->
    <path d="M 448 391 C 448 380, 456 375, 470 375 C 484 375, 492 380, 492 391 Z" fill="#d1c4e9" />
    <circle cx="470" cy="363" r="11" fill="#ffd54f" />
    <!-- Hair -->
    <path d="M 456 362 C 456 348, 484 348, 484 362 C 484 365, 478 367, 470 367 C 462 367, 456 365, 456 362 Z" fill="#e65100" />
    <!-- Connection Status -->
    <circle cx="494" cy="358" r="6" fill="url(#greenNodeGrad)" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- ================= FLOATING CHAT BUBBLES ================= -->

  <!-- Chat Bubble Left -->
  <g class="float-chat" filter="url(#chatShadow)" transform="translate(190, 110)">
    <rect width="65" height="32" rx="16" fill="#1877f2" />
    <path d="M 20 32 L 28 38 L 26 32 Z" fill="#1877f2" />
    <text x="32" y="20" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Hello!</text>
  </g>

  <!-- Chat Bubble Right -->
  <g class="float-chat" filter="url(#chatShadow)" transform="translate(370, 310)">
    <rect width="80" height="32" rx="16" fill="#38ef7d" />
    <path d="M 60 32 L 52 38 L 54 32 Z" fill="#38ef7d" />
    <!-- Love Icon / Heart -->
    <path d="M 32 12 C 29 9, 24 9, 22 12 C 20 15, 20 20, 25 24 L 32 28 L 39 24 C 44 20, 44 15, 42 12 C 40 9, 35 9, 32 12 Z" fill="#ffffff" transform="translate(8, 0) scale(0.7)" />
    <text x="48" y="20" fill="#ffffff" font-family="'Plus Jakarta Sans', sans-serif" font-weight="bold" font-size="11">Shared</text>
  </g>

  <!-- Like Icon Circle Floating Center-Left -->
  <g class="float-avatar-2" filter="url(#chatShadow)">
    <circle cx="210" cy="290" r="20" fill="#ffffff" />
    <!-- Like Thumb (Blue) -->
    <path d="M 204 294 L 204 288 C 204 286, 205.5 284, 207 284 C 207.5 284, 208 284.5, 208 285 L 208 287 C 210.5 287, 215 288, 215 290.5 C 215 292, 213 293, 212 293.5 L 212 295 L 204 295 Z" fill="#1877f2" transform="translate(-1, -1) scale(0.9)" />
    <path d="M 201 288 L 203 288 L 203 294 L 201 294 Z" fill="#166fe5" transform="translate(-1, -1) scale(0.9)" />
  </g>

  <!-- Sparkles/Stars floating -->
  <g class="float-avatar-3">
    <!-- Star 1 -->
    <path d="M 280 120 L 283 125 L 288 126 L 284 130 L 285 135 L 280 132 L 275 135 L 276 130 L 272 126 L 277 125 Z" fill="#ffd54f" opacity="0.8" />
    <!-- Star 2 -->
    <path d="M 390 190 L 392 193 L 396 194 L 393 197 L 394 200 L 390 198 L 386 200 L 387 197 L 384 194 L 388 193 Z" fill="#ffd54f" opacity="0.6" />
  </g>
</svg>
